<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>

    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style/index.css">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <section id="loginPage" class="flex justify-center items-center min-h-screen ">
        <div class="card w-96 bg-white shadow-xl p-6 mt-5 mb-5">
            <div class="flex justify-center">
                <img src="./assets/github-logo.png" alt="" class="w-16 mb-3">
            </div>
            <div class="text-center ">
                <h2 class="font-semibold text-2xl ">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] ">Sign in to manage your issues</p>
            </div>
            <div>
                <fieldset class="fieldset  p-4 ">

                    <label class="label font-semibold text-black ">Username</label>
                    <input id="username" type="text " class="input" placeholder="Enter Username " />
                    <p class="text-[#4A00FF] text-sm ">Default:admin</p>

                    <label class="label font-semibold text-black ">Password</label>
                    <input id="password " type="password" class="input " placeholder="Enter Password " />
                    <p class="text-[#4A00FF] text-sm ">Default:admin123</p>

                    <button id="loginBtn" class="btn btn-primary mt-4 ">Sign In</button>
                </fieldset>
            </div>
            <div class="flex items-center gap-3 my-4 ">
                <hr class="flex-1 border-gray-200 ">
                <p class="text-sm ">OR</p>
                <hr class="flex-1 border-gray-200 ">
            </div>
            <div class="text-center ">
                <p class="text-sm text-[#64748B] ">Demo Credentials:</p>
                <div class="bg-[#1F293710] mt-10 ">
                    <p><span class="font-semibold ">Username:</span> admin</p>
                    <p><span class="font-semibold ">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </section>
</body>



</html>

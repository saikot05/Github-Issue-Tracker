<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style/index.css">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <header>
        <div class="navbar bg-base-100 shadow-sm flex justify-between px-8">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl gap-2"><img src="./assets/github-logo.png" alt="" class="w-8">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-4">

                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="searchInput" type="search" required placeholder="Search issues..." />
                </label>
                <button id="newIssueBtn" class="btn btn-primary">+ New Issue</button>

            </div>

        </div>
    </header>
    <section class="w-10/12 mx-auto mt-8 px-6">
        <div class="bg-white rounded-lg shadow-sm p-4 flex gap-3">
            <button onclick="toggleStyle('allTab')" id="allTab" class="btn btn-primary px-10">All</button>
            <button onclick="toggleStyle('openTab')" id="openTab" class="btn btn-soft px-8">Open</button>
            <button onclick="toggleStyle('closedTab')" id="closedTab" class="btn btn-soft px-8">Closed</button>
        </div>
        <div>
            <div class="bg-white p-5 flex justify-between items-center mt-3 rounded-t-lg">
                <div class="flex items-center gap-3">
                    <div class="bg-[#4A00FF20] rounded-full p-1">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h3 id="issueCount" class="font-semibold text-lg">0 Issues</h3>
                        <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <p class="text-sm">Open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-2 h-2 bg-purple-500 rounded-full">
                        </span>
                        <p class="text-sm">Closed</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 bg-white rounded-b-lg shadow-sm p-6">

        </div>
    </section>

    <dialog id="issue" class="modal">
        <div class="modal-box max-w-xl">
            <h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>
            <div class="flex items-center gap-3 text-sm text-gray-500 mb-3">
                <span id="modalStatus" class="px-2 py-1 rounded-full text-xs font-semibold"></span>
                <span id="modalAuthor"></span>
                <span id="modalDate"></span>
            </div>
            <div id="modalLabels" class="flex gap-2 mb-3"></div>
            <p id="modalDesc" class="text-gray-600 mb-4"></p>
            <div class="grid grid-cols-2 gap-4 bg-gray-100 p-3 rounded-md text-sm">
                <div>
                    <p class="text-gray-500">Assignee</p>
                    <p id="modalAssignee" class="font-semibold"></p>
                </div>
                <div>
                    <p class="text-gray-500">Priority</p>
                    <p id="modalPriority" class="font-semibold"></p>
                </div>
            </div>
            <div class="flex justify-end mt-5">
                <button onclick="closeModal()" class="btn btn-primary btn-sm">Close</button>
            </div>
        </div>
    </dialog>


    <script src="./script/index.js"></script>
</body>

</html>
